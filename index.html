<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA服装厂 - 服饰定制设计工具</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://cdn.bootcdn.net" crossorigin>
<link rel="dns-prefetch" href="https://fonts.loli.net">
<link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+QingKe+HuangYou&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+QingKe+HuangYou&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
/* ===== DARK PREMIUM THEME ===== */
:root{--bg:#0c0c0e;--card:#161618;--card2:#1e1e21;--border:rgba(255,255,255,0.07);--text:#eaeaec;--text2:#6b6b73;--accent:#4f8fff;--accent-light:rgba(79,143,255,0.1);--danger:#ff5252;--success:#34d399;--shadow:0 2px 8px rgba(0,0,0,.4);--shadow-lg:0 8px 30px rgba(0,0,0,.6);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loadingScreen .spinner{width:36px;height:36px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingScreen p{margin-top:16px;color:var(--text2);font-size:13px;letter-spacing:.5px}
#app{display:none;flex:1;flex-direction:column;height:100vh}

/* ===== HEADER ===== */
header{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;z-index:10;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap}
.logo span{color:var(--accent);font-weight:800}
.tab-group{display:flex;gap:3px}
.tab-group button{padding:5px 14px;border:1px solid var(--border);background:transparent;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s;font-family:inherit}
.tab-group button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-group button:hover:not(.active){background:var(--accent-light);color:var(--accent)}
.header-sep{width:1px;height:20px;background:var(--border)}
.header-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.header-actions button{padding:6px 14px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s;font-weight:500;font-family:inherit}
.header-actions button:hover{border-color:var(--text2);color:var(--text)}
.btn-primary{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.btn-primary:hover{background:#3b7bef!important}
.btn-danger{color:var(--danger)!important}
.btn-danger:hover{border-color:var(--danger)!important}
.btn-publish{background:var(--success)!important;color:#0c0c0e!important;border-color:var(--success)!important;font-weight:600!important}
.btn-publish:hover{background:#2bc48a!important}

/* ===== LAYOUT ===== */
main{flex:1;display:flex;overflow:hidden}
.sidebar-left{width:256px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.tool-section h3{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tool-section input[type="text"],.tool-section select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;background:var(--card2);color:var(--text);transition:border-color .2s}
.tool-section input:focus,.tool-section select:focus{outline:none;border-color:var(--accent)}
.tool-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.tool-row label{font-size:11px;color:var(--text2);min-width:32px;flex-shrink:0}
.color-input-wrap{display:flex;align-items:center;gap:6px;flex:1}
.color-input-wrap input[type="color"]{width:28px;height:24px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px;background:var(--card2)}
.color-input-wrap input[type="text"]{background:var(--card2);color:var(--text)}
.tool-btn{width:100%;padding:7px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;font-weight:500;text-align:center;font-family:inherit}
.tool-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.tool-btn-sm{padding:4px 8px;font-size:11px;width:auto;display:inline-flex;align-items:center;justify-content:center;min-width:26px}
.tool-btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== COLOR SWATCHES ===== */
.color-swatches{display:flex;flex-wrap:wrap;gap:5px}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.color-swatch.is-white{border-color:#555}

.font-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card2);color:var(--text);cursor:pointer;font-family:inherit}
.font-select option{background:var(--card);color:var(--text)}
.font-select optgroup{color:var(--accent);font-weight:700}

/* ===== TEMPLATES ===== */
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.template-card{padding:8px 4px;border:1px solid var(--border);border-radius:6px;cursor:pointer;text-align:center;font-size:9px;color:var(--text2);transition:all .15s}
.template-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.template-card .tp{font-size:15px;margin-bottom:2px;line-height:1.2}

/* ===== CANVAS AREA ===== */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;overflow:auto;gap:18px}
.canvas-col{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.col-label{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:2px;text-transform:uppercase;transition:color .2s;user-select:none}
.canvas-col.active .col-label{color:var(--accent)}
.canvas-wrapper{position:relative;width:360px;height:480px;border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;flex-shrink:0;outline:2px solid transparent;outline-offset:3px;transition:outline-color .3s}
.canvas-col.active .canvas-wrapper{outline-color:var(--accent)}
.garment-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.garment-layer canvas{width:100%;height:100%;display:block}
.canvas-wrapper .canvas-container{position:relative!important;z-index:1}
/* Hint text for double-click */
.dblclick-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:.5px;pointer-events:none;z-index:2;white-space:nowrap;transition:opacity .3s}

/* ===== RIGHT SIDEBAR ===== */
.sidebar-right{width:180px;background:var(--card);border-left:1px solid var(--border);overflow-y:auto;padding:14px;flex-shrink:0}
.sidebar-right h3{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.layer-list{display:flex;flex-direction:column;gap:2px}
.layer-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border:1px solid transparent;border-radius:5px;cursor:pointer;font-size:11px;transition:all .12s;color:var(--text2)}
.layer-item:hover{background:var(--card2)}
.layer-item.active{background:var(--accent-light);border-color:rgba(79,143,255,0.2);color:var(--text)}
.layer-item .li-icon{width:16px;text-align:center;opacity:.5;flex-shrink:0}
.layer-item .li-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .li-del{width:18px;height:18px;border:none;background:none;cursor:pointer;font-size:9px;border-radius:4px;color:var(--text2);flex-shrink:0}
.layer-item .li-del:hover{background:rgba(255,82,82,0.15);color:var(--danger)}

/* ===== SELECTION TOOLS ===== */
#selectionTools{display:none}
#textTools{display:none}
input[type="range"]{width:100%;height:3px;-webkit-appearance:none;background:#333;border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}

/* ===== VIEWS ===== */
#designView{display:flex;flex:1;overflow:hidden}
#galleryView{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:24px 32px}
.gallery-header{text-align:center;margin-bottom:24px}
.gallery-header h2{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
.gallery-header p{color:var(--text2);font-size:13px}
.gallery-empty{text-align:center;padding:80px 20px;color:var(--text2)}
.gallery-empty .ge-icon{font-size:48px;margin-bottom:12px;opacity:.3}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.gallery-card{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);transition:all .2s}
.gallery-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
.gallery-card img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:#111;cursor:pointer}
.gallery-card .gc-info{padding:10px 14px}
.gallery-card .gc-title{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gallery-card .gc-meta{font-size:10px;color:var(--text2);display:flex;justify-content:space-between}
.gc-actions{display:flex;gap:5px;margin-top:8px;align-items:center}
.gc-vote{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border:1px solid var(--border);border-radius:14px;background:transparent;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:inherit}
.gc-vote:hover{border-color:var(--text2)}
.gc-vote.want.active{background:rgba(255,82,82,0.1);border-color:var(--danger);color:var(--danger)}
.gc-vote.unwant.active{background:rgba(255,255,255,0.05);border-color:#555;color:#888}
.gc-del{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid transparent;border-radius:50%;background:none;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.gc-del:hover{background:rgba(255,82,82,0.1);color:var(--danger)}

/* ===== MODAL & OVERLAYS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:460px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-card h3{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;letter-spacing:.5px}
.modal-preview{width:100%;max-height:280px;background:#0a0a0a;border-radius:8px;overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.modal-preview img{max-width:100%;max-height:280px;object-fit:contain}
.modal-form{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.modal-form input{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card2);color:var(--text)}
.modal-form input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:9px 22px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;background:transparent;font-family:inherit;color:var(--text2)}
.modal-actions button:hover{color:var(--text);border-color:var(--text2)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;color:#0c0c0e;padding:10px 24px;border-radius:20px;font-size:12px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1}
@media(max-width:1100px){.sidebar-right{display:none}}
@media(max-width:900px){.sidebar-left{width:220px}}
@media(max-width:700px){main{flex-direction:column}.sidebar-left{width:100%;max-height:180px}.canvas-area{flex-direction:column}}

/* ===== LOCAL FONT FACES — Original ===== */
@font-face{font-family:'Raleway Black';src:url('fonts/Raleway-Black.ttf') format('truetype');font-display:swap}

@font-face{font-family:'Akrobat Light';src:url('fonts/Akrobat-Light.otf') format('opentype');font-display:swap}

@font-face{font-family:'Comfortaa Light';src:url('fonts/Comfortaa-Light.ttf') format('truetype');font-display:swap}

/* ===== LOCAL FONT FACES — New Chinese ===== */
@font-face{font-family:'AlibabaPuHuiTi Bold';src:url('fonts/AlibabaPuHuiTi-Bold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'AlibabaPuHuiTi Black';src:url('fonts/AlibabaPuHuiTi-Black.ttf') format('truetype');font-display:swap}
@font-face{font-family:'AlibabaPuHuiTi Light';src:url('fonts/AlibabaPuHuiTi-Light.ttf') format('truetype');font-display:swap}

@font-face{font-family:'Economica Bold';src:url('fonts/Economica-Bold.ttf') format('truetype');font-display:swap}

<body>
<div id="loadingScreen"><div class="spinner"></div><p>AAA FASHION STUDIO</p></div>
<div id="app">
  <header>
    <div class="logo"><span>AAA</span> 服装厂</div>
    <div class="tab-group" id="productTabs">
      <button class="active" data-product="tee">短袖T恤</button>
      <button data-product="hoodie">连帽卫衣</button>
    </div>
    <div class="header-sep"></div>
    <div class="tab-group" id="viewTabs">
      <button class="active" data-view="design">设计工坊</button>
      <button data-view="gallery">展示区</button>
    </div>
    <div class="header-actions">
      <button onclick="app.clearCanvas()" class="btn-danger">清空</button>
      <button onclick="app.openPublish()" class="btn-publish">发布作品</button>
      <button onclick="app.exportMockup()">导出效果图</button>
      <button onclick="app.exportDesignOnly()" class="btn-primary">导出设计稿</button>
    </div>
  </header>
  <main>
    <div id="designView">
      <div class="sidebar-left">
        <div class="tool-section"><h3>衣服颜色</h3><div class="color-swatches" id="garmentColors"></div></div>

        <!-- Text tools: shown when text is selected or for newly created text -->
        <div class="tool-section" id="textTools">
          <h3>文字属性</h3>
          <div class="tool-row"><label>字体</label>
            <select id="fontSelect" class="font-select"></select>
          </div>
          <div class="tool-row"><label>大小</label>
            <input type="range" id="fontSizeRange" min="12" max="120" value="36" style="flex:1">
            <span id="fontSizeVal" style="font-size:11px;color:var(--text2);min-width:26px;text-align:right">36</span>
          </div>
          <div class="tool-row"><label>颜色</label>
            <div class="color-input-wrap">
              <input type="color" id="textColor" value="#FFFFFF">
              <input type="text" id="textColorHex" value="#FFFFFF" maxlength="7" style="width:72px">
            </div>
          </div>
          <div class="tool-row" style="gap:3px;margin-top:2px;flex-wrap:wrap">
            <button class="tool-btn tool-btn-sm" id="btnBold" onclick="app.toggleStyle('bold')"><b>B</b></button>
            <button class="tool-btn tool-btn-sm" id="btnItalic" onclick="app.toggleStyle('italic')"><i>I</i></button>
            <button class="tool-btn tool-btn-sm" id="btnUnderline" onclick="app.toggleStyle('underline')"><u>U</u></button>
            <span style="width:1px;height:18px;background:var(--border);margin:0 2px"></span>
            <button class="tool-btn tool-btn-sm" id="btnAlignLeft" onclick="app.setTextAlign('left')" title="左对齐">
              <svg width="13" height="13" viewBox="0 0 14 14"><line x1="1" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.6"/><line x1="1" y1="7" x2="9" y2="7" stroke="currentColor" stroke-width="1.6"/><line x1="1" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
            <button class="tool-btn tool-btn-sm active" id="btnAlignCenter" onclick="app.setTextAlign('center')" title="居中">

// ==================== IMAGE CACHE & TINTING ====================
const _imgCache = {};

function preloadGarmentImages() {
  const promises = [];
  Object.entries(GARMENT_IMAGES).forEach(([product, sides]) => {
    Object.entries(sides).forEach(([side, url]) => {
      promises.push(new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { _imgCache[product + '-' + side] = img; resolve(); };
        img.onerror = resolve;
        img.src = url;
      }));
    });
  });
  return Promise.all(promises);
}

/**
 * Tint garment: works for both light AND dark base garments.
 * Strategy: the garment pixels (dark, L<80) get replaced with target color
 * adjusted by their original luminance ratio to preserve fabric texture.
 * Background (light, L>220) stays untouched. Edge zone blends smoothly.
 */
function tintCanvas(ctx, img, w, h, hex) {
  ctx.drawImage(img, 0, 0, w, h);
  // For black garment, #2a2a2a is "natural" — skip tinting
  if (hex === '#2a2a2a') return;
  const id = ctx.getImageData(0, 0, w, h);
  const d = id.data;
  const cr = parseInt(hex.slice(1,3),16);
  const cg = parseInt(hex.slice(3,5),16);
  const cb = parseInt(hex.slice(5,7),16);
  for (let i = 0; i < d.length; i += 4) {
    const L = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
    if (L < 80) {
      // Garment body: apply target color, scale by luminance ratio to keep texture
      // L/40 gives subtle shading (original L~23 → ratio ~0.58, keeps depth)
      const shade = Math.min(L / 50, 1.0);
      d[i]   = (cr * shade)|0;
      d[i+1] = (cg * shade)|0;
      d[i+2] = (cb * shade)|0;
      // For white: make it truly white
      if (hex === '#FFFFFF') { d[i] = d[i+1] = d[i+2] = Math.max(200, (L/80*255)|0); }
    } else if (L < 120) {
      // Edge transition zone: blend from tinted to original
      const t = (L - 80) / 40; // 0=garment, 1=near-bg
      const shade = Math.min(L / 50, 1.0);
      let tr = (cr * shade)|0, tg = (cg * shade)|0, tb = (cb * shade)|0;
      if (hex === '#FFFFFF') { tr = tg = tb = Math.max(200, (L/80*255)|0); }
      d[i]   = (tr*(1-t) + d[i]*t)|0;
      d[i+1] = (tg*(1-t) + d[i+1]*t)|0;
      d[i+2] = (tb*(1-t) + d[i+2]*t)|0;
    }
    // L >= 120: background, leave untouched
  }
  ctx.putImageData(id, 0, 0);
}

// ==================== HELPERS ====================
function timeAgo(ts) {
  const d = Date.now()/1000 - ts;
  if(d<60) return '刚刚';
  if(d<3600) return Math.floor(d/60)+'分钟前';
  if(d<86400) return Math.floor(d/3600)+'小时前';
  if(d<604800) return Math.floor(d/86400)+'天前';
  return new Date(ts*1000).toLocaleDateString('zh-CN');
}

// ==================== APP ====================
class DesignApp {
  constructor() {
    this._activeSide = 'front';
    this._sides = {};
    this.currentProduct = 'tee';
    this.currentColorIdx = 0;
    this._styleState = { bold:false, italic:false, underline:false };
    this._currentAlign = 'center';
    this._publishDataUrl = null;
    this._uid = localStorage.getItem('aaa_uid');
    if (!this._uid) { this._uid = 'u_' + Math.random().toString(36).slice(2,10); localStorage.setItem('aaa_uid', this._uid); }
    this._isAdmin = new URLSearchParams(location.search).has('admin');
    const sa = localStorage.getItem('aaa_author');
    if (sa) setTimeout(() => { const el = document.getElementById('pubAuthor'); if(el) el.value = sa; }, 0);
  }

  get canvas() { return this._sides[this._activeSide]?.fc; }
  get printZoneRect() { return this._sides[this._activeSide]?.pzRect; }
  get printZone() { return PRINT_ZONES[this.currentProduct]; }
  get garmentColor() { return GARMENT_COLORS[this.currentColorIdx]; }

  init() {
    const pz = this.printZone;
    ['front', 'back'].forEach(side => {
      const fc = new fabric.Canvas('designCanvas-' + side, {
        width: CANVAS_W, height: CANVAS_H,
        backgroundColor: 'transparent',
        selection: true, preserveObjectStacking: true,
      });
      const pzRect = new fabric.Rect({
        left:pz.x, top:pz.y, width:pz.w, height:pz.h,
        fill:'transparent', stroke:'rgba(255,255,255,0.12)',
        strokeWidth:1, strokeDashArray:[6,4],
        selectable:false, evented:false, excludeFromExport:true,
      });
      fc.add(pzRect);

      // Switch active side on mouse down
      fc.on('mouse:down', () => {
        if (this._activeSide !== side) this.setActiveSide(side);
      });

      // Double-click on empty area → add text
      fc.on('mouse:dblclick', (opt) => {
        if (this._activeSide !== side) this.setActiveSide(side);
        const target = fc.findTarget(opt.e);
        if (target && target.type === 'i-text') return; // fabric handles editing
        const pointer = fc.getPointer(opt.e);
        const txt = new fabric.IText('双击编辑', {
          left: pointer.x, top: pointer.y,
          originX:'center', originY:'center',
          fontFamily: FONTS[0].name,
          fontSize: 36,
          fill: '#FFFFFF',
          textAlign: 'center',
        });
        fc.add(txt);
        fc.setActiveObject(txt);
        txt.enterEditing();
        txt.selectAll();
        fc.renderAll();
        this.updateLayers();
        // Hide hint
        const hint = document.querySelector('[data-side="'+side+'"] .dblclick-hint');
        if (hint) hint.style.opacity = '0';
      });

      fc.on('selection:created', () => this.onSelect());
      fc.on('selection:updated', () => this.onSelect());
      fc.on('selection:cleared', () => this.onDeselect());
      fc.on('object:modified', () => this.updateLayers());

      this._sides[side] = { fc, pzRect, designs: {} };
    });

    this.renderGarment();
    this.setupUI();
    this.updateLayers();
  }

  // ---- Active side ----
  setActiveSide(side) {
    if (this._activeSide === side) return;
    const cur = this._sides[this._activeSide];
    if (cur) { cur.fc.discardActiveObject(); cur.fc.renderAll(); }
    this._activeSide = side;
    document.querySelectorAll('.canvas-col').forEach(el => el.classList.toggle('active', el.dataset.side === side));
    document.getElementById('sideLabel').textContent = side === 'front' ? '正面' : '反面';
    this.onDeselect();
    this.updateLayers();
  }

  // ---- Garment rendering ----
  renderGarment() {
    const pz = this.printZone;
    ['front', 'back'].forEach(side => {
      const gc = document.getElementById('garmentCanvas-' + side);
      gc.width = CANVAS_W; gc.height = CANVAS_H;
      const ctx = gc.getContext('2d');
      const img = _imgCache[this.currentProduct + '-' + side];
      if (img) tintCanvas(ctx, img, CANVAS_W, CANVAS_H, this.garmentColor.hex);
      const s = this._sides[side];
      if (s) { s.pzRect.set({ left:pz.x, top:pz.y, width:pz.w, height:pz.h }); s.fc.renderAll(); }
    });
  }

  setGarmentColor(idx) {
    this.currentColorIdx = idx;
    this.renderGarment();
    document.querySelectorAll('.color-swatch').forEach((s,i) => s.classList.toggle('active', i===idx));
  }

  switchProduct(p) {
    if (p === this.currentProduct) return;
    this.saveAllDesigns();
    this.currentProduct = p;
    this.loadAllDesigns();
    this.renderGarment();
    document.querySelectorAll('#productTabs button').forEach(b => b.classList.toggle('active', b.dataset.product===p));
    this.updateLayers();
  }

  saveAllDesigns() {
    ['front', 'back'].forEach(side => {
      const s = this._sides[side];
      const objs = s.fc.getObjects().filter(o => o !== s.pzRect);
      if (objs.length) s.designs[this.currentProduct] = JSON.stringify(objs.map(o => o.toJSON(['excludeFromExport'])));
      else delete s.designs[this.currentProduct];
    });
  }

  loadAllDesigns() {
    ['front', 'back'].forEach(side => {
      const s = this._sides[side];
      s.fc.getObjects().filter(o => o !== s.pzRect).forEach(o => s.fc.remove(o));
      const d = s.designs[this.currentProduct];
      if (d) fabric.util.enlivenObjects(JSON.parse(d), objs => { objs.forEach(o => s.fc.add(o)); s.fc.renderAll(); });
      s.fc.renderAll();
    });
    this.updateLayers();
  }

  // ---- UI setup ----
  setupUI() {
    document.querySelectorAll('#productTabs button').forEach(b => b.addEventListener('click', () => this.switchProduct(b.dataset.product)));
    document.querySelectorAll('#viewTabs button').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('#viewTabs button').forEach(t => t.classList.remove('active'));
      b.classList.add('active');
      b.dataset.view === 'gallery' ? this.showGallery() : this.showDesign();
    }));
    document.querySelectorAll('.canvas-col').forEach(el => {
      el.addEventListener('click', (e) => {
        if (!e.target.closest('.canvas-container')) this.setActiveSide(el.dataset.side);
      });
    });
    // Garment colors
    const cw = document.getElementById('garmentColors');
    GARMENT_COLORS.forEach((c,i) => {
      const s = document.createElement('div');
      s.className = 'color-swatch'+(i===0?' active':'')+(c.hex==='#FFFFFF'?' is-white':'');
      s.style.backgroundColor = c.hex;
      s.title = c.name;
      s.addEventListener('click', () => this.setGarmentColor(i));
      cw.appendChild(s);
    });
    // Font select
    const sel = document.getElementById('fontSelect');
    let curGroup = '';
    FONTS.forEach((f,i) => {
      if (f.g !== curGroup) {
        curGroup = f.g;
        const og = document.createElement('optgroup');
        og.label = '── ' + curGroup + ' ──';
        sel.appendChild(og);
      }
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = f.label;
      sel.lastChild.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      const f = FONTS[+sel.value];
      const a = this.canvas.getActiveObject();
      if (a && a.type==='i-text') { a.set('fontFamily', f.name); this.canvas.renderAll(); }
    });
    // Font size
    const sr = document.getElementById('fontSizeRange'), sv = document.getElementById('fontSizeVal');
    sr.addEventListener('input', () => {
      sv.textContent = sr.value;
      const a = this.canvas.getActiveObject();
      if (a && a.type==='i-text') { a.set('fontSize', +sr.value); this.canvas.renderAll(); }
    });
    // Text color
    const cp = document.getElementById('textColor'), ch = document.getElementById('textColorHex');
    cp.addEventListener('input', () => {
      ch.value = cp.value;
      const a = this.canvas.getActiveObject();
      if (a && a.type==='i-text') { a.set('fill', cp.value); this.canvas.renderAll(); }
    });
    ch.addEventListener('change', () => {
      if (!/^#[0-9a-f]{6}$/i.test(ch.value)) return;
      cp.value = ch.value;
      const a = this.canvas.getActiveObject();
      if (a && a.type==='i-text') { a.set('fill', ch.value); this.canvas.renderAll(); }
    });
    // Opacity
    const or_ = document.getElementById('opacityRange'), ov = document.getElementById('opacityVal');
    or_.addEventListener('input', () => {
      ov.textContent = or_.value+'%';
      const a = this.canvas.getActiveObject();
      if (a) { a.set('opacity', +or_.value/100); this.canvas.renderAll(); }
    });
    // Image upload
    document.getElementById('imageUpload').addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        fabric.Image.fromURL(ev.target.result, img => {
          const pz = this.printZone;
          const sc = Math.min(pz.w/img.width, pz.h/img.height, 1)*0.8;
          img.set({ left:pz.x+pz.w/2, top:pz.y+pz.h/2, originX:'center', originY:'center', scaleX:sc, scaleY:sc });
          this.canvas.add(img); this.canvas.setActiveObject(img); this.canvas.renderAll(); this.updateLayers();
          this.toast('图片已添加到' + (this._activeSide==='front'?'正面':'反面'));
        });
      };
      reader.readAsDataURL(file); e.target.value='';
    });
    this.buildTemplates();
    // Keyboard
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
      // Allow Delete/Backspace only when NOT editing text
      const ao = this.canvas.getActiveObject();
      if (ao && ao.type === 'i-text' && ao.isEditing) return;
      if ((e.key==='Delete'||e.key==='Backspace') && ao) { this.deleteSelected(); e.preventDefault(); }
      if (e.key==='d' && (e.metaKey||e.ctrlKey)) { this.duplicateSelected(); e.preventDefault(); }
    });
  }

  onSelect() {
    const obj = this.canvas.getActiveObject();
    if (!obj || obj===this.printZoneRect) return;
    document.getElementById('selectionTools').style.display = 'block';
    document.getElementById('opacityRange').value = Math.round((obj.opacity||1)*100);
    document.getElementById('opacityVal').textContent = Math.round((obj.opacity||1)*100)+'%';
    if (obj.type==='i-text') {
      document.getElementById('textTools').style.display = 'block';
      document.getElementById('fontSizeRange').value = obj.fontSize||36;
      document.getElementById('fontSizeVal').textContent = obj.fontSize||36;
      document.getElementById('textColor').value = obj.fill||'#FFFFFF';
      document.getElementById('textColorHex').value = obj.fill||'#FFFFFF';
      this.updateAlignUI(obj.textAlign||'center');
      // Try to find font index
      const fi = FONTS.findIndex(f => f.name === obj.fontFamily);
      if (fi >= 0) document.getElementById('fontSelect').value = fi;
    } else {
      document.getElementById('textTools').style.display = 'none';
    }
  }

  onDeselect() {
    document.getElementById('selectionTools').style.display = 'none';
    document.getElementById('textTools').style.display = 'none';
  }

  buildTemplates() {
    const g = document.getElementById('templateGrid');
    TEMPLATES.forEach(t => {
      const c = document.createElement('div'); c.className='template-card';
      c.innerHTML = '<div class="tp" style="font-family:\''+t.font+'\';color:'+t.color+'">'+t.text.split('\n')[0]+'</div><div>'+t.text.replace('\n',' ')+'</div>';
      c.addEventListener('click', () => this.applyTemplate(t));
      g.appendChild(c);
    });
  }

  applyTemplate(t) {
    const pz = this.printZone;
    const txt = new fabric.IText(t.text, {
      left:pz.x+pz.w/2, top:pz.y+pz.h/2, originX:'center', originY:'center',
      fontFamily:t.font, fontSize:t.size||36, fill:t.color||'#FFFFFF', textAlign:'center',
    });
    this.canvas.add(txt); this.canvas.setActiveObject(txt); this.canvas.renderAll(); this.updateLayers();
    this.toast('模板已应用');
  }

  // ---- Text styles ----
  toggleStyle(s) {
    this._styleState[s] = !this._styleState[s];
    document.getElementById('btn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active', this._styleState[s]);
    const a = this.canvas.getActiveObject();
    if (a && a.type==='i-text') {
      if (s==='bold') a.set('fontWeight', this._styleState.bold?'bold':'normal');
      if (s==='italic') a.set('fontStyle', this._styleState.italic?'italic':'normal');
      if (s==='underline') a.set('underline', this._styleState.underline);
      this.canvas.renderAll();
    }
  }

  setTextAlign(align) {
    this._currentAlign = align;
    this.updateAlignUI(align);
    const a = this.canvas.getActiveObject();
    if (a && a.type==='i-text') { a.set('textAlign', align); this.canvas.renderAll(); }
  }

  updateAlignUI(align) {
    document.getElementById('btnAlignLeft').classList.toggle('active', align==='left');
    document.getElementById('btnAlignCenter').classList.toggle('active', align==='center');
    document.getElementById('btnAlignRight').classList.toggle('active', align==='right');
  }

  // ---- Object ops ----
  deleteSelected() {
    const a = this.canvas.getActiveObject();
    if(a && a!==this.printZoneRect) { this.canvas.remove(a); this.canvas.discardActiveObject(); this.canvas.renderAll(); this.updateLayers(); }
  }
  duplicateSelected() {
    const a = this.canvas.getActiveObject();
    if(!a || a===this.printZoneRect) return;
    a.clone(c => { c.set({left:c.left+15,top:c.top+15}); this.canvas.add(c); this.canvas.setActiveObject(c); this.canvas.renderAll(); this.updateLayers(); });
  }
  bringForward() { const a=this.canvas.getActiveObject(); if(a&&a!==this.printZoneRect){this.canvas.bringForward(a);this.canvas.renderAll();this.updateLayers();} }
  sendBackward() { const a=this.canvas.getActiveObject(); if(a&&a!==this.printZoneRect){this.canvas.sendBackwards(a);this.canvas.sendToBack(this.printZoneRect);this.canvas.renderAll();this.updateLayers();} }
  clearCanvas() {
    const side = this._activeSide === 'front' ? '正面' : '反面';
    if(!confirm('确定清空'+side+'画布？')) return;
    this.canvas.getObjects().filter(o=>o!==this.printZoneRect).forEach(o=>this.canvas.remove(o));
    this.canvas.discardActiveObject(); this.canvas.renderAll(); this.updateLayers();
    this.toast(side+'画布已清空');
  }

  // ---- Layers ----
  updateLayers() {
    const list = document.getElementById('layerList');
    const objs = this.canvas.getObjects().filter(o=>o!==this.printZoneRect);
    if (!objs.length) {
      list.innerHTML = '<div style="font-size:11px;color:var(--text2);text-align:center;padding:20px">暂无图层</div>';
      return;
    }
    list.innerHTML = '';
    [...objs].reverse().forEach((obj,i) => {
      const item = document.createElement('div');
      item.className = 'layer-item' + (this.canvas.getActiveObject()===obj ? ' active' : '');
      const icon = obj.type==='i-text' ? 'T' : '&#128444;';
      const name = obj.type==='i-text' ? (obj.text||'').substring(0,10) : '图片';
      const ri = objs.length - 1 - i;
      item.innerHTML = '<span class="li-icon">'+icon+'</span><span class="li-name">'+name+'</span><button class="li-del" onclick="app.removeLayerObj('+ri+')">&#10005;</button>';
      item.addEventListener('click', e => { if(e.target.tagName==='BUTTON') return; this.canvas.setActiveObject(obj); this.canvas.renderAll(); this.updateLayers(); });
      list.appendChild(item);
    });
  }
  removeLayerObj(idx) {
    const objs = this.canvas.getObjects().filter(o=>o!==this.printZoneRect);
    if(objs[idx]) { this.canvas.remove(objs[idx]); this.canvas.discardActiveObject(); this.canvas.renderAll(); this.updateLayers(); }
  }

  // ---- Views ----
  showDesign() { document.getElementById('designView').style.display='flex'; document.getElementById('galleryView').style.display='none'; }
  showGallery() { document.getElementById('designView').style.display='none'; document.getElementById('galleryView').style.display='flex'; this.loadGallery(); }

  // ---- Gallery (localStorage) ----
  _escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  _getLocalGallery() { try { return JSON.parse(localStorage.getItem('aaa_gallery')||'[]'); } catch(e) { return []; } }
  _saveLocalGallery(items) { localStorage.setItem('aaa_gallery', JSON.stringify(items)); }

  async loadGallery() {
    const c = document.getElementById('galleryContent');
    c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">加载中...</div>';
    const items = this._getLocalGallery();
    if (!items.length) {
      c.innerHTML = '<div class="gallery-empty"><div class="ge-icon">&#127912;</div><p>还没有作品，成为第一个发布设计的人吧！</p></div>';
      return;
    }
    let h = '<div class="gallery-grid">';
    items.forEach(item => {
      const canDelete = this._isAdmin || (item.uid && item.uid === this._uid);
      const wants = item.wants || [], unwants = item.unwants || [];
      const userWanted = wants.includes(this._uid), userUnwanted = unwants.includes(this._uid);
      h += '<div class="gallery-card"><img src="'+item.imageUrl+'" loading="lazy" onclick="document.getElementById(\'lightboxImg\').src=\''+item.imageUrl+'\';document.getElementById(\'lightbox\').classList.add(\'show\')">';
      h += '<div class="gc-info"><div class="gc-title">'+this._escHtml(item.title)+'</div>';
      h += '<div class="gc-meta"><span>'+this._escHtml(item.author)+'</span><span>'+timeAgo(item.timestamp)+'</span></div>';
      h += '<div class="gc-actions">';
      h += '<button class="gc-vote want'+(userWanted?' active':'')+'" onclick="event.stopPropagation();app.vote(\''+item.id+'\',\'want\',this)">&#9829; 想要 <span>'+wants.length+'</span></button>';
      h += '<button class="gc-vote unwant'+(userUnwanted?' active':'')+'" onclick="event.stopPropagation();app.vote(\''+item.id+'\',\'unwant\',this)">&#10007; 不要 <span>'+unwants.length+'</span></button>';
      if (canDelete) h += '<button class="gc-del" onclick="event.stopPropagation();app.deleteWork(\''+item.id+'\')" title="删除">&#128465;</button>';
      h += '</div></div></div>';
    });
    h += '</div>';
    c.innerHTML = h;
  }

  async vote(id, voteType, btn) {
    const actions = btn.closest('.gc-actions');
    const wantBtn = actions.querySelector('.gc-vote.want'), unwantBtn = actions.querySelector('.gc-vote.unwant');
    const wantSpan = wantBtn.querySelector('span'), unwantSpan = unwantBtn.querySelector('span');
    const items = this._getLocalGallery();
    const item = items.find(i => i.id === id);
    if (!item) return;
    const wants = item.wants||[], unwants = item.unwants||[];
    if (wants.includes(this._uid)) wants.splice(wants.indexOf(this._uid), 1);
    if (unwants.includes(this._uid)) unwants.splice(unwants.indexOf(this._uid), 1);
    if (voteType==='want' && !wants.includes(this._uid)) wants.push(this._uid);
    if (voteType==='unwant' && !unwants.includes(this._uid)) unwants.push(this._uid);
    item.wants = wants; item.unwants = unwants;
    this._saveLocalGallery(items);
    wantBtn.classList.toggle('active', wants.includes(this._uid));
    unwantBtn.classList.toggle('active', unwants.includes(this._uid));
    wantSpan.textContent = wants.length; unwantSpan.textContent = unwants.length;
  }

  async deleteWork(id) {
    if (!confirm('确定删除这件作品？')) return;
    let items = this._getLocalGallery();
    items = items.filter(i => i.id !== id);
    this._saveLocalGallery(items);
    this.toast('作品已删除');
    this.loadGallery();
  }

  // ---- Publish ----
  openPublish() {
    const frontObjs = this._sides.front.fc.getObjects().filter(o => o !== this._sides.front.pzRect);
    const backObjs = this._sides.back.fc.getObjects().filter(o => o !== this._sides.back.pzRect);
    if (!frontObjs.length && !backObjs.length) { this.toast('画布上还没有设计内容'); return; }
    this.generateMockupDataURL(url => {
      this._publishDataUrl = url;
      document.getElementById('publishPreview').innerHTML = '<img src="'+url+'">';
      document.getElementById('publishModal').classList.add('show');
    });
  }
  cancelPublish() { document.getElementById('publishModal').classList.remove('show'); this._publishDataUrl=null; }

  async confirmPublish() {
    const title = document.getElementById('pubTitle').value.trim()||'未命名设计';
    const author = document.getElementById('pubAuthor').value.trim()||'匿名设计师';
    if (!this._publishDataUrl) return;
    localStorage.setItem('aaa_author', author);
    const did = Math.random().toString(36).substr(2, 8);
    const items = this._getLocalGallery();
    items.unshift({ id:did, title, author, uid:this._uid, product:this.currentProduct, color:this.garmentColor.hex, timestamp:Date.now()/1000, wants:[], unwants:[], imageUrl:this._publishDataUrl });
    this._saveLocalGallery(items);
    this.toast('作品发布成功！');
    this.cancelPublish();
    document.getElementById('pubTitle').value='';
  }

  // ---- Mockup generation ----
  _renderSideMockup(side) {
    const m = 2, w = CANVAS_W*m, h = CANVAS_H*m;
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const ctx = off.getContext('2d');
    const img = _imgCache[this.currentProduct + '-' + side];
    if (img) tintCanvas(ctx, img, w, h, this.garmentColor.hex);
    const s = this._sides[side];
    s.pzRect.set({visible:false}); s.fc.renderAll();
    const dUrl = s.fc.toDataURL({format:'png', multiplier:m});
    s.pzRect.set({visible:true}); s.fc.renderAll();
    return new Promise(resolve => {
      const dImg = new Image();
      dImg.onload = () => {
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(dImg, 0, 0, w, h);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.55;
        ctx.drawImage(dImg, 0, 0, w, h);
        ctx.globalAlpha = 1;
        resolve(off);
      };
      dImg.src = dUrl;
    });
  }

  generateMockupDataURL(cb) {
    Promise.all([this._renderSideMockup('front'), this._renderSideMockup('back')]).then(([f, b]) => {
      const m=2, w=CANVAS_W*m, h=CANVAS_H*m, gap=30*m;
      const combined = document.createElement('canvas');
      combined.width = w*2+gap; combined.height = h;
      const ctx = combined.getContext('2d');
      ctx.fillStyle = '#0c0c0e';
      ctx.fillRect(0, 0, combined.width, combined.height);
      ctx.drawImage(f, 0, 0);
      ctx.drawImage(b, w+gap, 0);
      ctx.font = 'bold '+(12*m)+'px "Noto Sans SC", sans-serif';
      ctx.fillStyle = '#6b6b73';
      ctx.textAlign = 'center';
      ctx.fillText('FRONT', w/2, h-10*m);
      ctx.fillText('BACK', w+gap+w/2, h-10*m);
      cb(combined.toDataURL('image/png'));
    });
  }

  // ---- Export ----
  exportMockup() {
    this.generateMockupDataURL(url => {
      const l = document.createElement('a');
      l.download = 'AAA-'+(this.currentProduct==='tee'?'TEE':'HOODIE')+'-mockup.png';
      l.href = url; document.body.appendChild(l); l.click(); document.body.removeChild(l);
      this.toast('效果图已导出');
    });
  }

  exportDesignOnly() {
    const side = this._activeSide === 'front' ? '正面' : '反面';
    this.printZoneRect.set({visible:false}); this.canvas.renderAll();
    const url = this.canvas.toDataURL({format:'png', multiplier:EXPORT_MULT});
    const l = document.createElement('a');
    l.download = 'AAA-design-'+this._activeSide+'.png'; l.href = url;
    document.body.appendChild(l); l.click(); document.body.removeChild(l);
    this.printZoneRect.set({visible:true}); this.canvas.renderAll();
    this.toast(side+'设计稿已导出');
  }

  toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(this._tt);
    this._tt = setTimeout(() => t.classList.remove('show'), 2200);
  }
}

// ==================== BOOT ====================
let app;
function showApp() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  app = new DesignApp();
  app.init();
}

(function boot() {
  const cdns = [
    'https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js',
    'https://cdn.bootcdn.net/ajax/libs/fabric.js/5.3.1/fabric.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js',
    'https://unpkg.com/fabric@5.3.1/dist/fabric.min.js',
  ];
  let i = 0;
  function tryNext() {
    if (i >= cdns.length) {
      document.getElementById('loadingScreen').innerHTML = '<p style="color:var(--danger);font-size:14px">加载失败，请刷新重试</p>';
      return;
    }
    const s = document.createElement('script'); s.src = cdns[i++];
    s.onload = () => {
      preloadGarmentImages().then(() => {
        Promise.race([
          document.fonts ? document.fonts.ready : Promise.resolve(),
          new Promise(r => setTimeout(r, 1500))
        ]).then(showApp);
      });
    };
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
